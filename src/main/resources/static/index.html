<!DOCTYPE html>
<html>
<head>
    <title>Barbershop Appointment Scheduler</title>
    <style>
        body
        {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        .header
        {
            background: #7b2cff;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
        }

        .container
        {
            width: 90%;
            margin: 30px auto;
        }

        .card
        {
            background: white;
            padding: 25px;
            margin-bottom: 22px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            text-align: center;
        }

        h2
        {
            margin-top: 0;
        }

        input, button
        {
            padding: 10px;
            margin: 6px;
        }

        button
        {
            cursor: pointer;
            background-color: #7b2cff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover
        {
            background-color: #5f1fd1;
        }

        .output-box
        {
            padding: 10px;
            min-height: 120px;
            text-align: left;
            overflow-x: auto;
        }

        table
        {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        th, td
        {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th
        {
            background: #7b2cff;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">Barbershop Appointment Scheduler</div>

<div class="container">

    <div class="card">
        <h2>View Availability Slots</h2>

        <button onclick="loadSlots()">View Slots</button>
        <button onclick="loadAppointments()">View Appointments</button>
    </div>

    <div class="card">
        <h2>Book Appointment</h2>

        <input id="clientId" placeholder="Client ID">
        <input id="barberId" placeholder="Barber ID">
        <input id="serviceId" placeholder="Service ID">
        <input id="slotId" placeholder="Slot ID">

        <button onclick="bookAppointment()">Book Appointment</button>
    </div>

    <div class="card">
        <h2>Cancel Appointment</h2>

        <input id="cancelAppointmentId" placeholder="Appointment ID">
        <input id="cancelSlotId" placeholder="Slot ID">

        <button onclick="cancelAppointment()">Cancel Appointment</button>
    </div>

    <div class="card">
        <h2>System Output</h2>

        <div id="output" class="output-box">Results will appear here...</div>
    </div>

</div>

<script>
    function showMessage(message)
    {
        document.getElementById("output").textContent = message;
    }

    function showSlots(slots)
    {
        let html = `
            <table>
                <tr>
                    <th>Slot ID</th>
                    <th>Barber ID</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Status</th>
                </tr>
        `;

        slots.forEach(slot =>
        {
            html += `
                <tr>
                    <td>${slot.slotId}</td>
                    <td>${slot.barberId}</td>
                    <td>${slot.startTime} AM</td>
                    <td>${slot.endTime} AM</td>
                    <td>${slot.status}</td>
                </tr>
            `;
        });

        html += `</table>`;

        document.getElementById("output").innerHTML = html;
    }

    function showAppointments(appointments)
    {
        let html = `
            <table>
                <tr>
                    <th>Appointment ID</th>
                    <th>Client ID</th>
                    <th>Barber ID</th>
                    <th>Service ID</th>
                    <th>Slot ID</th>
                    <th>Status</th>
                    <th>Time Booked</th>
                </tr>
        `;

        appointments.forEach(appointment =>
        {
            html += `
                <tr>
                    <td>${appointment.appointmentId}</td>
                    <td>${appointment.clientId}</td>
                    <td>${appointment.barberId}</td>
                    <td>${appointment.serviceId}</td>
                    <td>${appointment.slotId}</td>
                    <td>${appointment.status}</td>
                    <td>${appointment.timeBooked}</td>
                </tr>
            `;
        });

        html += `</table>`;

        document.getElementById("output").innerHTML = html;
    }

    function loadAppointments()
    {
        fetch("/appointments")
            .then(response => response.json())
            .then(data => showAppointments(data));
    }

    function loadSlots()
    {
        fetch("/slots")
            .then(response => response.json())
            .then(data => showSlots(data));
    }

    function bookAppointment()
    {
        const clientId = document.getElementById("clientId").value;
        const barberId = document.getElementById("barberId").value;
        const serviceId = document.getElementById("serviceId").value;
        const slotId = document.getElementById("slotId").value;

        if (!clientId || !barberId || !serviceId || !slotId)
        {
            showMessage("Please enter Client ID, Barber ID, Service ID, and Slot ID.");
            return;
        }

        fetch(`/appointments/book?clientId=${clientId}&barberId=${barberId}&serviceId=${serviceId}&slotId=${slotId}`,
        {
            method: "POST"
        })
        .then(response => response.text())
        .then(data => showMessage(data));
    }

    function cancelAppointment()
    {
        const appointmentId = document.getElementById("cancelAppointmentId").value;
        const slotId = document.getElementById("cancelSlotId").value;

        if (!appointmentId || !slotId)
        {
            showMessage("Please enter Appointment ID and Slot ID.");
            return;
        }

        fetch(`/appointments/cancel?appointmentId=${appointmentId}&slotId=${slotId}`,
        {
            method: "POST"
        })
        .then(response => response.text())
        .then(data => showMessage(data));
    }
</script>

</body>
</html>
